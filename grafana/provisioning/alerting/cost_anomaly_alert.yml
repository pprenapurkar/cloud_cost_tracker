apiVersion: 1
groups:
  - orgId: 1
    name: cost-anomaly-group
    folder: CostInt
    interval: 5m
    rules:
      - uid: cost-anomaly-rule
        title: Cost Anomaly Detected
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: costintdb
            model:
              datasource:
                type: postgres
                uid: costintdb
              format: table
              rawQuery: true
              rawSql: "SELECT COUNT(*) AS anomaly_count FROM cost_daily WHERE is_anomaly = true AND date > now() - interval '24 hours';"
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              reducer: last
              expression: A
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [B]
                  reducer:
                    type: last
                    params: []
                  type: query
              expression: B
              refId: C
        noDataState: NoData
        execErrState: Error
        for: 0m
        annotations:
          summary: One or more cost anomalies detected in the last 24h
          runbook_url: https://github.com/your-user/cloud-cost-intelligence/blob/main/docs/runbook-cost-anomaly.md
        labels:
          severity: warning
          team: finops
        isPaused: false
