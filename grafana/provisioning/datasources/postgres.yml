apiVersion: 1
datasources:
  - name: CostIntDB
    type: postgres
    uid: costintdb
    access: proxy
    url: postgres:5432
    user: ${POSTGRES_USER}
    jsonData:
      database: ${POSTGRES_DB}
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    isDefault: true
    editable: true
