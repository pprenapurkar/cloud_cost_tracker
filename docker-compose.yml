services:

  postgres:
    image: postgres:16
    container_name: costint-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-costint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-costint}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-costint} -d ${POSTGRES_DB:-costint}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pipeline:
    build: .
    container_name: costint-pipeline
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-costint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-costint}
      POSTGRES_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  grafana:
    image: grafana/grafana:11.1.0
    container_name: costint-grafana
    ports:
      - "3000:3000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-costint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-costint}
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-storage:/var/lib/grafana
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  grafana-storage:
